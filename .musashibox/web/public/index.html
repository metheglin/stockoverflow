<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MusashiBox - TODO Manager</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #333; }

    .header { background: #2c3e50; color: #fff; padding: 16px 24px; display: flex; align-items: center; gap: 12px; }
    .header h1 { font-size: 20px; font-weight: 600; }

    .container { max-width: 1200px; margin: 0 auto; padding: 24px; }

    .filters { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .filter-btn { padding: 6px 14px; border: 1px solid #ddd; border-radius: 16px; background: #fff; cursor: pointer; font-size: 13px; transition: all 0.15s; }
    .filter-btn:hover { border-color: #999; }
    .filter-btn.active { background: #2c3e50; color: #fff; border-color: #2c3e50; }

    .todo-list { display: flex; flex-direction: column; gap: 8px; }

    .todo-item { background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 14px 18px; cursor: pointer; transition: box-shadow 0.15s; display: flex; align-items: center; gap: 14px; }
    .todo-item:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }

    .todo-datetime { font-size: 12px; color: #888; white-space: nowrap; min-width: 100px; }
    .todo-title { flex: 1; font-weight: 500; font-size: 14px; }

    .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
    .badge-type { margin-right: 6px; }
    .badge-THINK { background: #e8f5e9; color: #2e7d32; }
    .badge-PLAN { background: #e3f2fd; color: #1565c0; }
    .badge-DEVELOP { background: #fff3e0; color: #e65100; }
    .badge-status { }
    .badge-pending { background: #fff9c4; color: #f57f17; }
    .badge-inprogress { background: #bbdefb; color: #0d47a1; }
    .badge-done { background: #c8e6c9; color: #1b5e20; }
    .badge-completed { background: #e0e0e0; color: #424242; }

    .worklog-indicator { font-size: 12px; color: #888; white-space: nowrap; }

    /* Detail panel */
    .overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.3); z-index: 100; }
    .overlay.open { display: block; }

    .detail-panel { display: none; position: fixed; top: 0; right: 0; width: 60vw; max-width: 100vw; height: 100vh; background: #fff; z-index: 101; box-shadow: -4px 0 20px rgba(0,0,0,0.15); overflow-y: auto; flex-direction: column; }
    .detail-panel.open { display: flex; }

    .panel-header { padding: 16px 20px; border-bottom: 1px solid #eee; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .panel-header h2 { font-size: 16px; }
    .close-btn { background: none; border: none; font-size: 24px; cursor: pointer; color: #666; padding: 4px 8px; }
    .close-btn:hover { color: #000; }

    .panel-body { padding: 20px; flex: 1; overflow-y: auto; }

    .panel-meta { display: flex; gap: 8px; margin-bottom: 16px; align-items: center; flex-wrap: wrap; }

    .status-select { padding: 4px 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; }

    .editor-area { width: 100%; min-height: 400px; border: 1px solid #ddd; border-radius: 6px; padding: 12px; font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; font-size: 13px; line-height: 1.6; resize: vertical; }

    .btn-row { display: flex; gap: 8px; margin-top: 12px; }
    .btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; transition: background 0.15s; }
    .btn-primary { background: #2c3e50; color: #fff; }
    .btn-primary:hover { background: #34495e; }
    .btn-secondary { background: #ecf0f1; color: #333; }
    .btn-secondary:hover { background: #ddd; }

    .save-feedback { font-size: 13px; color: #27ae60; margin-left: 8px; opacity: 0; transition: opacity 0.3s; }
    .save-feedback.show { opacity: 1; }

    .worklog-section { margin-top: 24px; border-top: 1px solid #eee; padding-top: 16px; }
    .worklog-section h3 { font-size: 14px; margin-bottom: 10px; color: #555; }
    .worklog-content { background: #f8f9fa; border: 1px solid #e9ecef; border-radius: 6px; padding: 12px; font-family: monospace; font-size: 13px; line-height: 1.6; white-space: pre-wrap; }
    .worklog-toggle { cursor: pointer; padding: 8px 12px; background: #f0f0f0; border: 1px solid #ddd; border-radius: 4px; font-size: 13px; margin-bottom: 8px; display: inline-block; }
    .worklog-toggle:hover { background: #e0e0e0; }

    .empty-state { text-align: center; padding: 60px 20px; color: #999; }

    .btn-danger { background: #e74c3c; color: #fff; }
    .btn-danger:hover { background: #c0392b; }
    .btn-archive { background: #95a5a6; color: #fff; }
    .btn-archive:hover { background: #7f8c8d; }

    .nav-tabs { display: flex; gap: 0; margin-bottom: 20px; border-bottom: 2px solid #ddd; }
    .nav-tab { padding: 10px 20px; cursor: pointer; font-size: 14px; font-weight: 500; border: none; background: none; color: #888; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.15s; }
    .nav-tab:hover { color: #333; }
    .nav-tab.active { color: #2c3e50; border-bottom-color: #2c3e50; }

    .archive-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; background: #f0f0f0; color: #999; border: 1px dashed #ccc; }

    .todo-item.archived { opacity: 0.7; border-style: dashed; }
  </style>
</head>
<body>
  <div class="header">
    <h1>MusashiBox TODO Manager</h1>
  </div>

  <div class="container">
    <div class="nav-tabs">
      <button class="nav-tab active" data-view="todos">TODOs</button>
      <button class="nav-tab" data-view="archives">Archives</button>
    </div>
    <div class="filters" id="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="status:pending">Pending</button>
      <button class="filter-btn" data-filter="status:inprogress">In Progress</button>
      <button class="filter-btn" data-filter="status:done">Done</button>
      <button class="filter-btn" data-filter="status:completed">Completed</button>
      <button class="filter-btn" data-filter="type:THINK">THINK</button>
      <button class="filter-btn" data-filter="type:PLAN">PLAN</button>
      <button class="filter-btn" data-filter="type:DEVELOP">DEVELOP</button>
    </div>
    <div class="todo-list" id="todoList"></div>
  </div>

  <div class="overlay" id="overlay"></div>
  <div class="detail-panel" id="detailPanel">
    <div class="panel-header">
      <h2 id="panelTitle">TODO Detail</h2>
      <button class="close-btn" id="closePanel">&times;</button>
    </div>
    <div class="panel-body">
      <div class="panel-meta" id="panelMeta"></div>
      <textarea class="editor-area" id="editor"></textarea>
      <div class="btn-row">
        <button class="btn btn-primary" id="saveBtn">Save</button>
        <span class="save-feedback" id="saveFeedback">Saved!</span>
      </div>
      <div class="worklog-section" id="worklogSection" style="display:none;">
        <h3>WORKLOG</h3>
        <div id="worklogContent"></div>
      </div>
    </div>
  </div>

  <script>
    let todos = [];
    let archives = [];
    let currentFilter = 'all';
    let currentTodo = null;
    let currentView = 'todos'; // 'todos' or 'archives'

    async function loadTodos() {
      const res = await fetch('/api/todos');
      todos = await res.json();
      renderList();
    }

    async function loadArchives() {
      const res = await fetch('/api/archives');
      archives = await res.json();
      renderList();
    }

    function matchFilter(todo) {
      if (currentFilter === 'all') return true;
      const [key, val] = currentFilter.split(':');
      if (key === 'status') return todo.status === val;
      if (key === 'type') return todo.todoType === val;
      return true;
    }

    function renderList() {
      if (currentView === 'todos') {
        renderTodos();
      } else {
        renderArchives();
      }
    }

    function renderTodos() {
      const list = document.getElementById('todoList');
      const filtered = todos.filter(matchFilter);

      if (filtered.length === 0) {
        list.innerHTML = '<div class="empty-state">No TODOs found</div>';
        return;
      }

      list.innerHTML = filtered.map(todo => `
        <div class="todo-item" data-filename="${todo.filename}">
          <span class="todo-datetime">${todo.datetime}</span>
          <span class="badge badge-type badge-${todo.todoType}">${todo.todoType}</span>
          <span class="todo-title">${todo.title.replace(/_/g, ' ')}</span>
          ${todo.worklogs.length > 0 ? '<span class="worklog-indicator">WORKLOG</span>' : ''}
          <span class="badge badge-status badge-${todo.status}">${todo.status}</span>
        </div>
      `).join('');
    }

    function renderArchives() {
      const list = document.getElementById('todoList');
      const filtered = archives.filter(matchFilter);

      if (filtered.length === 0) {
        list.innerHTML = '<div class="empty-state">No archived TODOs</div>';
        return;
      }

      list.innerHTML = filtered.map(todo => `
        <div class="todo-item archived" data-filename="${todo.filename}">
          <span class="todo-datetime">${todo.datetime}</span>
          <span class="badge badge-type badge-${todo.todoType}">${todo.todoType}</span>
          <span class="todo-title">${todo.title.replace(/_/g, ' ')}</span>
          <span class="archive-badge">ARCHIVED</span>
          <span class="badge badge-status badge-${todo.status}">${todo.status}</span>
        </div>
      `).join('');
    }

    // Nav tabs
    document.querySelector('.nav-tabs').addEventListener('click', e => {
      const tab = e.target.closest('.nav-tab');
      if (!tab) return;
      document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      currentView = tab.dataset.view;
      if (currentView === 'archives') {
        loadArchives();
      } else {
        renderList();
      }
    });

    // Filter buttons
    document.getElementById('filters').addEventListener('click', e => {
      const btn = e.target.closest('.filter-btn');
      if (!btn) return;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      renderList();
    });

    // Open detail panel
    document.getElementById('todoList').addEventListener('click', async e => {
      const item = e.target.closest('.todo-item');
      if (!item) return;
      const filename = item.dataset.filename;
      const apiBase = currentView === 'archives' ? '/api/archives' : '/api/todos';
      const res = await fetch(`${apiBase}/${encodeURIComponent(filename)}`);
      const todo = await res.json();
      todo._isArchived = currentView === 'archives';
      currentTodo = todo;
      openPanel(todo);
    });

    function openPanel(todo) {
      document.getElementById('panelTitle').textContent = todo.title.replace(/_/g, ' ');
      document.getElementById('editor').value = todo.content;

      const meta = document.getElementById('panelMeta');
      meta.innerHTML = `
        <span class="badge badge-type badge-${todo.todoType}">${todo.todoType}</span>
        <span style="font-size:13px;color:#888;">${todo.datetime}</span>
        <select class="status-select" id="statusSelect">
          <option value="pending" ${todo.status === 'pending' ? 'selected' : ''}>pending</option>
          <option value="inprogress" ${todo.status === 'inprogress' ? 'selected' : ''}>inprogress</option>
          <option value="done" ${todo.status === 'done' ? 'selected' : ''}>done</option>
          <option value="completed" ${todo.status === 'completed' ? 'selected' : ''}>completed</option>
        </select>
      `;

      // Worklogs
      const worklogSection = document.getElementById('worklogSection');
      const worklogContent = document.getElementById('worklogContent');
      const source = todo._isArchived ? archives : todos;
      const worklogs = source.find(t => t.filename === todo.filename)?.worklogs || [];

      if (worklogs.length > 0) {
        worklogSection.style.display = 'block';
        worklogContent.innerHTML = worklogs.map(w =>
          `<div class="worklog-toggle" data-worklog="${w}">${w}</div><div class="worklog-body" id="wl-${w}" style="display:none;"></div>`
        ).join('');
      } else {
        worklogSection.style.display = 'none';
      }

      // Archive/Restore button
      const btnRow = document.querySelector('.btn-row');
      const existingArchiveBtn = document.getElementById('archiveBtn');
      if (existingArchiveBtn) existingArchiveBtn.remove();
      const existingRestoreBtn = document.getElementById('restoreBtn');
      if (existingRestoreBtn) existingRestoreBtn.remove();

      if (todo._isArchived) {
        const restoreBtn = document.createElement('button');
        restoreBtn.id = 'restoreBtn';
        restoreBtn.className = 'btn btn-secondary';
        restoreBtn.textContent = 'Restore from Archive';
        restoreBtn.onclick = async () => {
          await fetch(`/api/archives/${encodeURIComponent(currentTodo.filename)}/restore`, { method: 'POST' });
          closePanel();
          await loadArchives();
        };
        btnRow.appendChild(restoreBtn);
      } else {
        const archiveBtn = document.createElement('button');
        archiveBtn.id = 'archiveBtn';
        archiveBtn.className = 'btn btn-archive';
        archiveBtn.textContent = 'Archive';
        archiveBtn.onclick = async () => {
          if (!confirm('Archive this TODO?')) return;
          await fetch(`/api/todos/${encodeURIComponent(currentTodo.filename)}/archive`, { method: 'POST' });
          closePanel();
          await loadTodos();
        };
        btnRow.appendChild(archiveBtn);
      }

      document.getElementById('overlay').classList.add('open');
      document.getElementById('detailPanel').classList.add('open');
    }

    function closePanel() {
      document.getElementById('overlay').classList.remove('open');
      document.getElementById('detailPanel').classList.remove('open');
      currentTodo = null;
    }

    document.getElementById('closePanel').addEventListener('click', closePanel);
    document.getElementById('overlay').addEventListener('click', closePanel);

    // Save content
    document.getElementById('saveBtn').addEventListener('click', async () => {
      if (!currentTodo) return;
      const content = document.getElementById('editor').value;
      const newStatus = document.getElementById('statusSelect').value;

      // Save content first
      await fetch(`/api/todos/${encodeURIComponent(currentTodo.filename)}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ content }),
      });

      // Change status if different
      if (newStatus !== currentTodo.status) {
        const res = await fetch(`/api/todos/${encodeURIComponent(currentTodo.filename)}/status`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status: newStatus }),
        });
        const data = await res.json();
        if (data.filename) {
          currentTodo.filename = data.filename;
          currentTodo.status = newStatus;
        }
      }

      const fb = document.getElementById('saveFeedback');
      fb.classList.add('show');
      setTimeout(() => fb.classList.remove('show'), 2000);

      await loadTodos();
    });

    // Load worklog on click
    document.getElementById('worklogContent').addEventListener('click', async e => {
      const toggle = e.target.closest('.worklog-toggle');
      if (!toggle) return;
      const filename = toggle.dataset.worklog;
      const bodyEl = document.getElementById(`wl-${filename}`);

      if (bodyEl.style.display === 'none') {
        const res = await fetch(`/api/worklogs/${encodeURIComponent(filename)}`);
        const data = await res.json();
        bodyEl.innerHTML = `<div class="worklog-content">${escapeHtml(data.content)}</div>`;
        bodyEl.style.display = 'block';
      } else {
        bodyEl.style.display = 'none';
      }
    });

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // Keyboard shortcut
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closePanel();
    });

    loadTodos();
  </script>
</body>
</html>
